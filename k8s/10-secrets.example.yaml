apiVersion: v1
kind: Secret
metadata:
  name: bt-config
  namespace: bt
type: Opaque
stringData:
  # Copy this file to 10-secrets.yaml and fill in real values.
  # 10-secrets.yaml is gitignored — never commit credentials.
  DATABASE_URL: "postgres://app:CHANGE_ME@postgres_db:5432/app"
  AI_SERVICE_URL: "http://bt-ai.bt.svc.cluster.local:8001"
  OPENAI_API_KEY: "sk-CHANGE_ME"
  REALTIME_MODEL: "gpt-realtime-2"
  GATEWAY_URL: "http://bt-gateway.bt.svc.cluster.local"

  # AWS credentials for gateway -> DynamoDB PHI writes.
  # Source of truth: AWS Secrets Manager secret `bt/gateway/aws-credentials`
  # (account 689517798275, us-east-1). Retrieve with:
  #   aws secretsmanager get-secret-value \
  #     --secret-id bt/gateway/aws-credentials \
  #     --query SecretString --output text | jq
  AWS_ACCESS_KEY_ID: "AKIA..."        # IAM user bt-gateway-vm
  AWS_SECRET_ACCESS_KEY: "..."        # ditto
  AWS_REGION: "us-east-1"
  BT_DDB_TABLE: "bt-main"
  BT_DDB_REGION: "us-east-1"

  # Twilio Voice (HIPAA BAA required on the Twilio account).
  #
  #   TWILIO_AUTH_TOKEN     — signs/verifies inbound webhook + Media Stream
  #                           upgrades. Required for the current bridge.
  #                           Twilio Console -> Account -> Auth Tokens.
  #
  #   TWILIO_ACCOUNT_SID    — "AC…" — used by the provisioning script and any
  #                           future outbound REST API call. Always public-
  #                           safe but kept here for one-stop-shop.
  #
  #   TWILIO_API_KEY_SID    — "SK…" — preferred basic-auth username for
  #   TWILIO_API_KEY_SECRET   outbound REST calls (rotates independently of
  #                           the account auth token). Required only when we
  #                           ship outbound features (SMS confirmations,
  #                           programmatic call control, etc.).
  #
  #   TWILIO_PUBLIC_HOST    — host Twilio dials us on. Must match the webhook
  #                           URL set on the Twilio number EXACTLY, otherwise
  #                           every call returns 403 (signature mismatch).
  #
  #   BT_PUBLIC_WS_BASE     — wss base the AI service emits in TwiML so the
  #                           Media Stream connects back to the gateway.
  TWILIO_AUTH_TOKEN:     "CHANGE_ME"
  TWILIO_ACCOUNT_SID:    "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TWILIO_API_KEY_SID:    "SKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TWILIO_API_KEY_SECRET: "CHANGE_ME"
  TWILIO_PUBLIC_HOST:    "brightertomorrowtherapy.cloud"
  BT_PUBLIC_WS_BASE:     "wss://brightertomorrowtherapy.cloud"
