# Dev mode: route the bt-web Service to the host's Next.js dev server (HMR enabled)
# instead of an in-cluster pod. Requires `npm run dev` running on host:3001
# and bt-web Deployment scaled to 0.
---
apiVersion: v1
kind: Service
metadata:
  name: bt-web
  namespace: bt
spec:
  # No selector — endpoints are managed manually below.
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: bt-web
  namespace: bt
subsets:
  - addresses:
      - ip: 172.18.0.1   # host gateway on the postgres_db_default network
    ports:
      - port: 3001
        protocol: TCP
        name: http
