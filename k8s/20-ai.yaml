apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-ai
  namespace: bt
spec:
  replicas: 1
  selector: { matchLabels: { app: bt-ai } }
  template:
    metadata:
      labels: { app: bt-ai }
    spec:
      containers:
        - name: ai
          image: bt-ai:prod-d3d348e-1779922572
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8001 }]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: DATABASE_URL } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: OPENAI_API_KEY } }
            - name: OPENAI_BASE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: OPENAI_BASE_URL, optional: true } }
            - name: OPENAI_MODEL
              valueFrom: { secretKeyRef: { name: bt-config, key: OPENAI_MODEL, optional: true } }
            # Flagship gpt-5.5 everywhere (extract + respond). OPENAI_EXTRACT_MODEL
            # intentionally NOT set so extract_model_name() falls back to OPENAI_MODEL.
            - name: REALTIME_MODEL
              valueFrom: { secretKeyRef: { name: bt-config, key: REALTIME_MODEL, optional: true } }
            - name: BT_API_URL
              value: "https://api.brightertomorrowtherapy.cloud"
            - name: BT_GATEWAY_URL
              value: "http://bt-gateway"
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: bt-config, key: AWS_ACCESS_KEY_ID } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: AWS_SECRET_ACCESS_KEY } }
            - name: AWS_REGION
              valueFrom: { secretKeyRef: { name: bt-config, key: AWS_REGION, optional: true } }
            # Twilio. AI side reads BT_PUBLIC_WS_BASE for TwiML emission.
            # ACCOUNT_SID + API_KEY_* are wired now so future outbound features
            # (SMS confirmations, programmatic call control) work without a
            # secrets rollout. Inbound auth verification stays in the gateway.
            - name: BT_PUBLIC_WS_BASE
              valueFrom: { secretKeyRef: { name: bt-config, key: BT_PUBLIC_WS_BASE, optional: true } }
            - name: TWILIO_ACCOUNT_SID
              valueFrom: { secretKeyRef: { name: bt-config, key: TWILIO_ACCOUNT_SID, optional: true } }
            - name: TWILIO_API_KEY_SID
              valueFrom: { secretKeyRef: { name: bt-config, key: TWILIO_API_KEY_SID, optional: true } }
            - name: TWILIO_API_KEY_SECRET
              valueFrom: { secretKeyRef: { name: bt-config, key: TWILIO_API_KEY_SECRET, optional: true } }
            # Relaxed 1700 -> 900: with server_vad threshold raised to 0.85,
            # OpenAI's own VAD rejects PSTN echo, so the app-side gate only
            # needs to catch the loudest echo tail (2026-05-24).
            - name: TWILIO_ECHO_GATE_RMS
              value: "900"
            # Phone bridge selector: raw_ws = new raw-WebSocket bridge
            # (app/voice_rt, explicit response control, urackit_v2-style);
            # sdk = legacy Agents-SDK bridge (app/twilio_voice.py). 2026-05-24.
            - name: VOICE_BRIDGE
              value: "raw_ws"
            # --- LangSmith (agent tracing for the new LangGraph stack) ----
            - name: LANGSMITH_TRACING
              valueFrom: { secretKeyRef: { name: bt-config, key: LANGSMITH_TRACING, optional: true } }
            - name: LANGSMITH_API_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: LANGSMITH_API_KEY, optional: true } }
            - name: LANGSMITH_PROJECT
              valueFrom: { secretKeyRef: { name: bt-config, key: LANGSMITH_PROJECT, optional: true } }
            - name: LANGSMITH_ENDPOINT
              valueFrom: { secretKeyRef: { name: bt-config, key: LANGSMITH_ENDPOINT, optional: true } }
            # --- Voice pipeline (Deepgram STT + Cartesia TTS) -------------
            - name: DEEPGRAM_API_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: DEEPGRAM_API_KEY, optional: true } }
            - name: CARTESIA_API_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: CARTESIA_API_KEY, optional: true } }
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: bt-ai
  namespace: bt
spec:
  selector: { app: bt-ai }
  ports:
    - port: 8001
      targetPort: 8001
