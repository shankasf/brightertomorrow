---
# Let's Encrypt production issuer using HTTP-01 via Traefik (web entrypoint).
# cert-manager spawns a temporary Ingress on /.well-known/acme-challenge/* on port 80;
# Traefik routes it before our HTTPS-redirect middleware (which is scoped to a specific
# Ingress, not the whole entrypoint).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sagar@callsphere.tech
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
