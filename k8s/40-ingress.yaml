---
# HTTP -> HTTPS redirect middleware (Traefik CRD)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: bt
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP ingress: serves the redirect only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-http
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: bt-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: brightertomorrowtherapy.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
    - host: www.brightertomorrowtherapy.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
---
# HTTPS ingress: /v1/* and /admin/api/* → bt-gateway, everything else → bt-web
#
# Admin HTML pages (/admin, /admin/login, /admin/contacts, etc.) are served by Next.js
# under the / catch-all. All admin API calls live under /admin/api/* — that single
# longer prefix wins under Traefik's longest-match rule.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-https
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: bt-tls
      hosts:
        - brightertomorrowtherapy.cloud
        - www.brightertomorrowtherapy.cloud
  rules:
    - host: brightertomorrowtherapy.cloud
      http:
        paths:
          # All public API → gateway
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          # Admin API → gateway
          - path: /admin/api
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          # Everything else (including all /admin/* HTML pages) → Next.js
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
    - host: www.brightertomorrowtherapy.cloud
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/api
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
