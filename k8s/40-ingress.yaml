---
# HTTP -> HTTPS redirect middleware (Traefik CRD)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: bt
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# www.brightertomorrowtherapy.com → brightertomorrowtherapy.com 301 redirect (Traefik CRD)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: www-to-apex-com
  namespace: bt
spec:
  redirectRegex:
    regex: "^https://www\\.brightertomorrowtherapy\\.com(.*)"
    replacement: "https://brightertomorrowtherapy.com${1}"
    permanent: true
---
# HTTP ingress: serves the redirect only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-http
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: bt-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: brightertomorrowtherapy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
    - host: www.brightertomorrowtherapy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
    - host: admin.brightertomorrowtherapy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
---
# .cloud was fully decommissioned 2026-06-13 (app is .com-only). The former
# bt-web-https-cloud cert-owner ingress, the bt-tls cert, and the entire
# k8s/41 .cloud→.com redirect stack were deleted. Nothing serves .cloud anymore.
---
# HTTPS ingress (.com apex + admin): cert-manager issues bt-com-tls for the .com hosts.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-https-com
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: bt-com-tls
      hosts:
        - brightertomorrowtherapy.com
        - www.brightertomorrowtherapy.com
        - admin.brightertomorrowtherapy.com
  rules:
    - host: brightertomorrowtherapy.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/api
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
    - host: admin.brightertomorrowtherapy.com
      http:
        paths:
          - path: /admin/api
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
---
# HTTPS ingress (www.com): separate object so the www-to-apex-com middleware
# annotation applies only to this host. Traefik middleware annotations are
# per-Ingress object, not per-rule, so www must be isolated here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-https-com-www
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: bt-www-to-apex-com@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: bt-com-tls
      hosts:
        - www.brightertomorrowtherapy.com
  rules:
    - host: www.brightertomorrowtherapy.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
