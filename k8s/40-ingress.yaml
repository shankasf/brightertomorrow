---
# HTTP -> HTTPS redirect middleware (Traefik CRD)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: bt
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP ingress: serves the redirect only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-http
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: bt-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
---
# HTTPS ingress: /v1/* and specific /admin/api/* → bt-gateway, everything else → bt-web
#
# Admin HTML pages (/admin/login, /admin/, etc.) are served by Next.js (bt-web via / catch-all).
# Admin API calls use specific sub-path prefixes routed to bt-gateway.
# Traefik picks the longest matching prefix, so /admin/auth beats / for API calls.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bt-web-https
  namespace: bt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - secretName: bt-tls
  rules:
    - http:
        paths:
          # All public API → gateway
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          # Admin API sub-paths → gateway (HTML pages like /admin/login fall through to / → bt-web)
          - path: /admin/auth
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/stats
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/contacts
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/chat
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/newsletter
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/audit
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          - path: /admin/content
            pathType: Prefix
            backend:
              service:
                name: bt-gateway
                port:
                  number: 80
          # Everything else (including /admin/login, /admin/) → Next.js
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bt-web
                port:
                  number: 80
