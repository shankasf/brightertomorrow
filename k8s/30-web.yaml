apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-web
  namespace: bt
spec:
  replicas: 1
  selector: { matchLabels: { app: bt-web } }
  template:
    metadata:
      labels: { app: bt-web }
    spec:
      containers:
        - name: web
          image: bt-web:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: DATABASE_URL } }
            - name: AI_SERVICE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: AI_SERVICE_URL } }
            - name: GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: GATEWAY_URL
            # NODE_ENV intentionally NOT set here: Next.js infers it from the
            # runtime (`next dev` → development; standalone `node server.js` →
            # production, set in web/Dockerfile). Setting it explicitly causes
            # a "non-standard NODE_ENV" warning when Tilt swaps in the dev image.
            - name: NEXT_PUBLIC_AWS_REGION
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_AWS_REGION } }
            - name: NEXT_PUBLIC_COGNITO_USER_POOL_ID
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_COGNITO_USER_POOL_ID } }
            - name: NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID } }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: bt-web
  namespace: bt
spec:
  selector: { app: bt-web }
  ports:
    - port: 80
      targetPort: 3000
