apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-web
  namespace: bt
spec:
  replicas: 1
  selector: { matchLabels: { app: bt-web } }
  template:
    metadata:
      labels: { app: bt-web }
    spec:
      containers:
        - name: web
          image: bt-web:prod-2596ff3-1782842552
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - name: SITE_URL
              # Canonical host since the 2026-06-12 DNS cutover; .cloud now 301s here
              value: "https://brightertomorrowtherapy.com"
            - name: ADMIN_HOST_URL
              value: "https://admin.brightertomorrowtherapy.com"
            # GA4 Measurement ID — public (ships in the gtag URL), so a plain
            # value, not a secret. The layout mounts GA only on the canonical
            # host and never on /admin. Empty = GA disabled.
            - name: GA4_MEASUREMENT_ID
              value: "G-H30MK1JCXN"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: DATABASE_URL } }
            - name: AI_SERVICE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: AI_SERVICE_URL } }
            - name: GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: GATEWAY_URL
            - name: NEXT_PUBLIC_AWS_REGION
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_AWS_REGION } }
            - name: NEXT_PUBLIC_COGNITO_USER_POOL_ID
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_COGNITO_USER_POOL_ID } }
            - name: NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID
              valueFrom: { secretKeyRef: { name: bt-config, key: NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID } }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: bt-web
  namespace: bt
spec:
  selector: { app: bt-web }
  ports:
    - port: 80
      targetPort: 3000
