apiVersion: batch/v1
kind: Job
metadata:
  name: bt-faq-embed
  namespace: bt
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: embed
          image: bt-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.embed_faqs"]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: bt-config, key: DATABASE_URL } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: bt-config, key: OPENAI_API_KEY } }
            - name: OPENAI_EMBED_MODEL
              valueFrom: { secretKeyRef: { name: bt-config, key: OPENAI_EMBED_MODEL, optional: true } }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
