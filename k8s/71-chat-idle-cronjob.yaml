apiVersion: batch/v1
kind: CronJob
metadata:
  name: bt-chat-idle-sweeper
  namespace: bt
  labels:
    app: bt-chat-idle-sweeper
spec:
  # Every 5 minutes — Zendesk Chat web standard is 20-min idle → end session.
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: chat-idle-sweeper
              image: postgres:17-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: bt-config
                      key: DATABASE_URL
              command:
                - sh
                - -c
                - |
                  psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
                  SET search_path = bt, public;

                  -- Chat content lives in DynamoDB; we read activity from the
                  -- s.last_message_at counter that the gateway maintains.
                  UPDATE bt.chat_sessions s
                  SET ended_at = COALESCE(s.last_message_at, s.started_at) + INTERVAL '20 minutes'
                  WHERE s.ended_at IS NULL
                    AND s.purged_at IS NULL
                    AND COALESCE(s.last_message_at, s.started_at) < now() - INTERVAL '20 minutes'
                  RETURNING s.id;
                  SQL
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
