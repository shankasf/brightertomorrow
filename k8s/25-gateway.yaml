apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-gateway
  namespace: bt
  labels:
    app: bt-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bt-gateway
  template:
    metadata:
      labels:
        app: bt-gateway
    spec:
      containers:
        - name: gateway
          image: bt-gateway:prod-a012d83-1779923145
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: DATABASE_URL
            - name: AI_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: AI_SERVICE_URL
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: ADMIN_INITIAL_EMAIL
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: ADMIN_INITIAL_EMAIL
                  optional: true
            - name: ADMIN_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: ADMIN_INITIAL_PASSWORD
                  optional: true
            # Use least-privilege bt-gateway-vm IAM user (DynamoDB only).
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: BT_GATEWAY_AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: BT_GATEWAY_AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: AWS_REGION
            - name: BT_DDB_TABLE
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: BT_DDB_TABLE
            - name: BT_DDB_REGION
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: BT_DDB_REGION
            - name: COGNITO_USER_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: COGNITO_USER_POOL_ID
            - name: COGNITO_USER_POOL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: COGNITO_USER_POOL_CLIENT_ID
            # SNS topic ARN for urgent safety-queue escalations (crisis +
            # mandatory-report handoffs publish here). Non-secret; topic
            # ARN is stable and provisioned by BtObservability CDK stack.
            - name: SNS_ALERT_TOPIC_ARN
              value: "arn:aws:sns:us-east-1:689517798275:bt-alerts"
            # Patient appointment notifications (email via SES, queued to
            # bt-notifications-outbox → bt-notifications-retry Lambda).
            # Enabled 2026-05-25: SES domain mail.brightertomorrowtherapy.cloud
            # verified, bt-gateway-vm has unconditional kms:Encrypt for the
            # outbox payload. SMS stays off until Twilio A2P 10DLC is live.
            - name: BT_APPOINTMENT_NOTIFY_ENABLED
              value: "true"
            # Lambda to invoke synchronously after writing an outbox row for
            # truly-immediate notification delivery (no EventBridge tick wait).
            - name: BT_NOTIFICATIONS_RETRY_LAMBDA
              value: "bt-notifications-retry"
            # Twilio Voice webhook signature verification + future outbound.
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            - name: TWILIO_PUBLIC_HOST
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: TWILIO_PUBLIC_HOST
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_API_KEY_SID
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: TWILIO_API_KEY_SID
                  optional: true
            - name: TWILIO_API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: bt-config
                  key: TWILIO_API_KEY_SECRET
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 5
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bt-gateway
  namespace: bt
spec:
  selector:
    app: bt-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
